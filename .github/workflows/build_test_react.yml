name: Build and Test React Application

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]

# ─── Variables partagées ──────────────────────────────────────────────────────
env:
  NODE_VERSION: '24.x'
  PNPM_VERSION: '10'
  APP_DIR: app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  build_test — gate central de la CI                                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
  build_test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # Expose le node_modules artifact pour les jobs aval
      node-modules-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: cd ${{ env.APP_DIR }} && pnpm install --frozen-lockfile

      # ── Cache Cypress binary (fallback install si cache absent) ──────────
      - name: Cache Cypress binary
        id: cypress-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: cypress-${{ runner.os }}-

      - name: Install Cypress binary (cache miss uniquement)
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: cd ${{ env.APP_DIR }} && pnpm exec cypress install

      # ── Doc + Build en parallèle via bash natif (aucune dépendance) ─────────
      - name: Generate JSDoc + Build React (parallel)
        run: |
          cd ${{ env.APP_DIR }}
          pnpm run doc & pnpm run build &
          wait

      # ── Tests unitaires ───────────────────────────────────────────────────
      - name: Run Tests
        run: cd ${{ env.APP_DIR }} && pnpm test

      - name: Start Full Infrastructure for E2E
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
        run: docker compose up -d --wait db api react

      # ── Cypress e2e (le binaire vient du cache, pas besoin d'install) ──────
      # Note: install: false + cache Cypress ci-dessus remplacent l'ancien
      #       `pnpm exec cypress install` qui était redondant avec cette action
      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: ${{ env.APP_DIR }}
          install: false
          wait-on: 'http://localhost:5173/InteDepContinu/'

      # ── Coverage — non bloquant (Codecov outage ne casse pas le deploy) ───
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.APP_DIR }}/coverage/lcov.info

      # ── GitHub Pages artifact ─────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./${{ env.APP_DIR }}/dist


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  publish-npm — vérifie la version et publie si nécessaire                    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
  publish-npm:
    needs: build_test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: cd ${{ env.APP_DIR }} && pnpm install --frozen-lockfile

      - name: Check if version changed
        id: check_version
        run: |
          cd ${{ env.APP_DIR }}
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          set +e
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            ERROR_LOG=$(npm view "$PACKAGE_NAME" version 2>&1)
            if echo "$ERROR_LOG" | grep -q "E404"; then
              echo "Package not found (E404). Initializing to 0.0.0."
              NPM_VERSION="0.0.0"
            else
              echo "::error::NPM Error: $ERROR_LOG"
              exit 1
            fi
          fi

          echo "Local version:  $LOCAL_VERSION"
          echo "NPM version:    $NPM_VERSION"

          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "ℹ️ **NPM Publish Skipped:** Version $LOCAL_VERSION is already on the registry." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build and Publish to NPM
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          cd ${{ env.APP_DIR }}
          npm run build-npm
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Success Summary
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          LOCAL_VERSION=$(node -p "require('./${{ env.APP_DIR }}/package.json').version")
          echo "✅ **Successfully published version $LOCAL_VERSION to NPM!**" >> $GITHUB_STEP_SUMMARY


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  deploy — déploie sur GitHub Pages                                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
  deploy:
    needs: publish-npm
    if: always()
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  build-test-deploy-api — Docker build, test API, push Hub                    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
  build-test-deploy-api:
    needs: build_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Docker Buildx (requis pour le cache GHA) ──────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Cache images Docker Hub (mysql ~160MB, adminer) ───────────────────
      # Sans ce cache, chaque run retélécharge ~200MB depuis Docker Hub.
      # ScribeMD/docker-cache sauvegarde le daemon Docker entier dans le
      # cache GHA — au prochain run, les images sont restaurées en ~3s.
      - name: Cache Docker Hub images
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: docker-${{ runner.os }}-${{ hashFiles('docker-compose.yml') }}

      # ── Build image API avec cache GHA pour les layers ────────────────────
      - name: Build API image with layer cache
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          load: true
          tags: my-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Start services with Docker Compose
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
        run: docker compose up -d --wait db api # on cible db + api, adminer et test_site ne sont pas nécessaires

      - name: Verify Services and Test API
        run: |
          echo "📋 Checking containers status..."
          docker compose ps

          echo "🧪 Testing API endpoint..."
          if curl -s -f http://localhost:8000/users > /dev/null; then
            echo "✅ API /users is functional!"
          else
            echo "❌ API check failed"
            docker compose logs api
            exit 1
          fi

      - name: Check if API version changed
        id: check_api_version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('./server/pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Local version: $VERSION"

          set +e
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/python-api:$VERSION > /dev/null 2>&1
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "should_push=false" >> $GITHUB_OUTPUT
            echo "ℹ️ **Docker Push Skipped:** Version $VERSION already on Docker Hub." >> $GITHUB_STEP_SUMMARY
          else
            echo "should_push=true" >> $GITHUB_OUTPUT
          fi

      - name: Push API Image to Docker Hub
        if: steps.check_api_version.outputs.should_push == 'true'
        run: |
          VERSION=${{ steps.check_api_version.outputs.version }}
          docker tag my-api ${{ secrets.DOCKERHUB_USERNAME }}/python-api:$VERSION
          docker tag my-api ${{ secrets.DOCKERHUB_USERNAME }}/python-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-api:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-api:latest
          echo "✅ **Successfully published python-api:$VERSION to Docker Hub!**" >> $GITHUB_STEP_SUMMARY

      - name: Update Docker Hub Description
        if: steps.check_api_version.outputs.should_push == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/python-api
          readme-filepath: ./server/API_README.md