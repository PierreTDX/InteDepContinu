name: Build and Test React Application

on:
  push:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: cd app && pnpm exec cypress install

      - name: Generate JSDoc
        run: cd app && pnpm run doc

      - name: Build React App
        run: cd app && pnpm run build

      - name: Run Tests
        run: cd app && pnpm test

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: app
          start: pnpm dev
          wait-on: 'http://localhost:5173/InteDepContinu/'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info
          fail_ci_if_error: 'true'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  publish-npm:
    needs: build_test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Check if version changed
        id: check_version
        run: |
          cd app
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          
          # Récupère la version distante de manière robuste (Fail Fast)
          set +e
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            ERROR_LOG=$(npm view "$PACKAGE_NAME" version 2>&1)
            if echo "$ERROR_LOG" | grep -q "E404"; then
              echo "Package not found (E404). Initializing to 0.0.0."
              NPM_VERSION="0.0.0"
            else
              echo "::error::NPM Error: $ERROR_LOG"
              exit 1
            fi
          fi
          
          echo "Local version: $LOCAL_VERSION"
          echo "NPM version: $NPM_VERSION"
          
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "Version changed! Setting output to true."
            # On crée une variable de sortie pour la prochaine étape
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version $LOCAL_VERSION already published."
            echo "should_publish=false" >> $GITHUB_OUTPUT
            # Astuce visuelle : on ajoute un résumé sur la page du run
            echo "ℹ️ **NPM Publish Skipped:** Version $LOCAL_VERSION is already on the registry." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build and Publish to NPM
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          cd app
          echo "Building and Publishing version..."
          npm run build-npm
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          
      - name: Publish Success Summary
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          cd app
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "✅ Successfully published version $LOCAL_VERSION to NPM!"
          echo "✅ **Successfully published version $LOCAL_VERSION to NPM!**" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: publish-npm
    if: always()
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-test-deploy-api:
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build MySQL Image
        run: docker build -t my-mysql .

      - name: Build Python API Image
        run: docker build -t my-api ./server

      - name: Create Network
        run: docker network create stack-net

      - name: Run MySQL Container
        run: |
          docker run -d \
            --name mysql-container \
            --network stack-net \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }} \
            my-mysql

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in {1..30}; do
            if docker exec mysql-container mysql -u root -p${{ secrets.MYSQL_ROOT_PASSWORD }} -e "SELECT 1;" > /dev/null 2>&1; then
              echo "✅ MySQL is ready!"
              break
            fi
            echo "Still waiting... ($i/30)"
            sleep 3
          done

      - name: Run API Container
        run: |
          docker run -d \
            --name api-container \
            --network stack-net \
            -e MYSQL_HOST=${{ secrets.MYSQL_HOST }} \
            -e MYSQL_USER=${{ secrets.MYSQL_USER }} \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }} \
            -p 8000:8000 \
            my-api

      - name: Wait for API startup
        run: |
          echo "Waiting for API..."
          for i in {1..20}; do
            STATUS=$(docker inspect --format='{{.State.Status}}' api-container)
            if [ "$STATUS" = "exited" ]; then
              echo "❌ API container crashed"
              docker logs api-container
              exit 1
            fi
            if curl -s http://localhost:8000/users > /dev/null; then
              echo "✅ API is up!"
              exit 0
            fi
            echo "Waiting... ($i/20)"
            sleep 5
          done
          docker logs api-container
          exit 1

      - name: Push API Image to Docker Hub
        run: |
          docker tag my-api ${{ secrets.DOCKERHUB_USERNAME }}/python-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-api:latest