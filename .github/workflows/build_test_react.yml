name: Build and Test React Application

# pour éviter les builds multiples si tu pushes vite
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: cd app && pnpm exec cypress install

      - name: Generate JSDoc
        run: cd app && pnpm run doc

      - name: Build React App
        run: cd app && pnpm run build

      - name: Run Tests
        run: cd app && pnpm test

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          working-directory: app
          install: false
          start: pnpm dev
          wait-on: 'http://localhost:5173/InteDepContinu/'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info
          fail_ci_if_error: 'true'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./app/dist

  publish-npm:
    needs: build_test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Check if version changed
        id: check_version
        run: |
          cd app
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          
          # Récupère la version distante de manière robuste (Fail Fast)
          set +e
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            ERROR_LOG=$(npm view "$PACKAGE_NAME" version 2>&1)
            if echo "$ERROR_LOG" | grep -q "E404"; then
              echo "Package not found (E404). Initializing to 0.0.0."
              NPM_VERSION="0.0.0"
            else
              echo "::error::NPM Error: $ERROR_LOG"
              exit 1
            fi
          fi
          
          echo "Local version: $LOCAL_VERSION"
          echo "NPM version: $NPM_VERSION"
          
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "Version changed! Setting output to true."
            # On crée une variable de sortie pour la prochaine étape
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version $LOCAL_VERSION already published."
            echo "should_publish=false" >> $GITHUB_OUTPUT
            # Astuce visuelle : on ajoute un résumé sur la page du run
            echo "ℹ️ **NPM Publish Skipped:** Version $LOCAL_VERSION is already on the registry." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build and Publish to NPM
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          cd app
          echo "Building and Publishing version..."
          npm run build-npm
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          
      - name: Publish Success Summary
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          cd app
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "✅ Successfully published version $LOCAL_VERSION to NPM!"
          echo "✅ **Successfully published version $LOCAL_VERSION to NPM!**" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: publish-npm
    if: always()
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-test-deploy-api:
    needs: build_test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start services with Docker Compose
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
        run: |
          DOCKER_BUILDKIT=1 docker compose up -d --build --wait

      - name: Verify Services and Test API
        run: |
          echo "📋 Checking containers status..."
          docker compose ps
          
          echo "🧪 Testing API endpoint..."
          if curl -s -f http://localhost:8000/users > /dev/null; then
            echo "✅ API /users is functional!"
          else
            echo "❌ API check failed"
            docker compose logs api
            exit 1
          fi

      - name: Check if API version changed
        id: check_api_version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('./server/pyproject.toml', 'rb'))['project']['version'])")
          echo "Local version: $VERSION"

          # Vérifie si le tag existe déjà sur Docker Hub
          set +e
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/python-api:$VERSION > /dev/null 2>&1
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Version $VERSION already exists on Docker Hub, skipping push."
            echo "should_push=false" >> $GITHUB_OUTPUT
            echo "ℹ️ **Docker Push Skipped:** Version $VERSION already on Docker Hub." >> $GITHUB_STEP_SUMMARY
          else
            echo "New version $VERSION detected!"
            echo "should_push=true" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Push API Image to Docker Hub
        if: steps.check_api_version.outputs.should_push == 'true'
        run: |
          VERSION=${{ steps.check_api_version.outputs.version }}
          docker tag my-api ${{ secrets.DOCKERHUB_USERNAME }}/python-api:$VERSION
          docker tag my-api ${{ secrets.DOCKERHUB_USERNAME }}/python-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-api:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-api:latest
          echo "✅ **Successfully published python-api:$VERSION to Docker Hub!**" >> $GITHUB_STEP_SUMMARY